<script>

const K_KEY = 'nomjPNZHYkGzzP5YIJePqI2cUON67v1pj9JPXb8BpcgnC5VX';

const DEVICE_IDS = [
'0d7dab01-e1c1-42f2-b266-9bd80694e4a1',
'db410241-f3de-401e-a569-473de7c0ceb3',
'910d75c5-eedd-4e0c-b4f3-38436eb7aab8',
'1b90f659-463e-46f7-8741-bf2509845187'
];


function calcAQI(pm){

if(pm<=30) return Math.round(pm*50/30);
if(pm<=60) return Math.round(50+(pm-30)*(50/30));
if(pm<=90) return Math.round(100+(pm-60)*(100/30));
if(pm<=120) return Math.round(200+(pm-90)*(100/30));
return 300;

}



async function updateData(){

let inAQI=0;
let outAQI=0;

try{

/* ---------------- Indoor Sensors ---------------- */

const fetches = DEVICE_IDS.map(id =>

fetch(`https://api.kaiterra.com/v1/devices/${id}/top?key=${K_KEY}`)
.then(r=>r.json())
.catch(()=>null)

);

const results = await Promise.all(fetches);

let pm25=[];
let pm10=[];

results.forEach(res=>{

if(res && res.data){

const p25 = res.data.find(x=>x.param==='rpm25c');
const p10 = res.data.find(x=>x.param==='rpm10c');

if(p25 && p25.points.length)
pm25.push(p25.points[0].value);

if(p10 && p10.points.length)
pm10.push(p10.points[0].value);

}

});


if(pm25.length>0){

const avg25 = Math.round(
pm25.reduce((a,b)=>a+b,0)/pm25.length
);

const avg10 = Math.round(
pm10.reduce((a,b)=>a+b,0)/pm10.length
);

inAQI = calcAQI(avg25);

document.getElementById('in-aqi').innerText=inAQI;

document.getElementById('in-pm25').innerHTML=
avg25+' µg/m³';

document.getElementById('in-pm10').innerHTML=
avg10+' µg/m³';

}


/* ---------------- Outdoor AQI ---------------- */

try{

const res = await fetch(
'https://api.waqi.info/feed/mumbai/?token=demo'
);

const data = await res.json();


if(data.status=="ok"){

outAQI=data.data.aqi || "--";

document.getElementById('out-aqi').innerText=outAQI;

if(data.data.iaqi.pm25){

document.getElementById('out-pm25').innerHTML=
Math.round(data.data.iaqi.pm25.v)+' µg/m³';

}

if(data.data.iaqi.pm10){

document.getElementById('out-pm10').innerHTML=
Math.round(data.data.iaqi.pm10.v)+' µg/m³';

}

}else{

document.getElementById('out-aqi').innerText="--";

}

}catch(e){

console.log("Outdoor AQI error");

document.getElementById('out-aqi').innerText="--";

}


/* ---------------- Status Text ---------------- */

const st=document.getElementById('status-text');

st.innerText=

inAQI<=15?"PRISTINE":

inAQI<=30?"EXCEPTIONAL":

inAQI<=45?"EXCELLENT":

inAQI<=60?"VERY GOOD":"GOOD";


}catch(e){

console.log("Main error",e);

}

}


/* Start */

updateData();

/* Refresh every 1 minute */

setInterval(updateData,60000);


</script>
